name: Update latest blog posts

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Fetch and update post list
        run: |
          python3 - <<'EOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import re

          req = urllib.request.Request(
              'https://tokarevxvi.dev/feed.xml',
              headers={'User-Agent': 'Mozilla/5.0 (compatible; nsmkhn-readme-bot/1.0)'}
          )

          try:
              with urllib.request.urlopen(req) as r:
                  xml = r.read()
          except urllib.error.HTTPError as e:
              print(f'Error fetching feed: HTTP {e.code} {e.reason}')
              print(f'URL: {e.full_url}')
              exit(1)

          root = ET.fromstring(xml)
          channel = root.find('channel')
          items = channel.findall('item')

          if not items:
              print('No posts found in feed')
              exit(1)

          lines = []
          for item in items:
              title = item.findtext('title')
              link = item.findtext('link')
              if title and link:
                  lines.append(f'- [{title}]({link})')

          with open('README.md') as f:
              content = f.read()

          new_block = '\n'.join(lines)
          updated = re.sub(
              r'<!-- BLOG-POST-LIST:START -->.*?<!-- BLOG-POST-LIST:END -->',
              f'<!-- BLOG-POST-LIST:START -->\n{new_block}\n<!-- BLOG-POST-LIST:END -->',
              content,
              flags=re.DOTALL
          )

          with open('README.md', 'w') as f:
              f.write(updated)
          EOF

      - name: Commit if changed
        run: |
          git config user.name 'nsmkhn'
          git config user.email 'tokarevxvi@gmail.com'
          git add README.md
          git diff --staged --quiet || (git commit -m 'chore: update latest blog posts' && git push)
